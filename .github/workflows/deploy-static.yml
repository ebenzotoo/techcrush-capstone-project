name: Deploy Static Website (Project 2)

on:
  push:
    branches:
      - main
    paths:
      - "Project 2/index.html"

jobs:
  deploy:
    name: Deploy to Azure VM via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy index.html to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script: |
            curl -fsSL https://raw.githubusercontent.com/ebenzotoo/techcrush-capstone-project/main/Project%202/index.html \
              -o /var/www/html/index.html
            sudo systemctl reload nginx
            echo "Deployment complete. Website is live."
